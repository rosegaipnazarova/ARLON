version: '3.8'

services:
  arlon-backend:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://host.docker.internal:27017/arlon
    # Server o'chib yonsa avtomat o'zi yonsin
    restart: always

  arlon-frontend:
    build: ./client
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - arlon-backend